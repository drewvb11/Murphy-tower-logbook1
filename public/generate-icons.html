<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c192" width="192" height="192"></canvas>
<br>
<button onclick="download('c512','logo512.png')">Download logo512.png</button>
<button onclick="download('c192','logo192.png')">Download logo192.png</button>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");
  const r = s * 0.12;

  // Background
  ctx.fillStyle = "#0d0f0f";
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Draw logo lines
  ctx.strokeStyle = "#a8e63d";
  ctx.lineWidth = s * 0.075;
  ctx.lineCap = "round";

  const scale = s / 38;
  const lines = [
    [4,34,14,6],[34,34,24,6],
    [10,34,17.5,13],[28,34,20.5,13],
    [16,34,19,22],[22,34,19,22]
  ];

  lines.forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath();
    ctx.moveTo(x1 * scale, y1 * scale);
    ctx.lineTo(x2 * scale, y2 * scale);
    ctx.stroke();
  });
}

function download(id, filename) {
  const canvas = document.getElementById(id);
  const a = document.createElement("a");
  a.download = filename;
  a.href = canvas.toDataURL("image/png");
  a.click();
}

drawIcon(document.getElementById("c512"));
drawIcon(document.getElementById("c192"));
</script>
</body>
</html>
